# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - dbtpcbttp

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@master

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Restore NuGet packages
      run: nuget restore TherapistPortal.sln

    - name: Build and publish with MSBuild
      run: msbuild TherapistPortal.sln /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:PublishUrl="${{github.workspace}}\myapp" /p:SkipInvalidConfigurations=true

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v1
      with:
        app-name: 'dbtpcbttp'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_45a1b84bd86f43a2b3993f6ddcc79181 }}
        package: ${{github.workspace}}\myapp
